spring.application.name=my-market-app
spring.main.web-application-type=reactive

# R2DBC H2
spring.r2dbc.url=r2dbc:h2:mem:///shopdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.r2dbc.username=sa
spring.r2dbc.password=

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Payment service
payment.service.url=http://localhost:8081

# Server
server.port=8080

# Logging
logging.level.ru.yandex.practicum.mymarket=DEBUG
logging.level.org.springframework.r2dbc=DEBUG
