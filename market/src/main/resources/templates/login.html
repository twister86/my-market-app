<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Вход — Витрина магазина</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width: 400px">
    <h2 class="mb-4 text-center">Вход в магазин</h2>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${param.registered}" class="alert alert-success">
        Регистрация успешна! Войдите в систему.
    </div>

    <form action="/login" method="post">
        <div class="mb-3">
            <label class="form-label">Логин</label>
            <input type="text" name="username" class="form-control" required autofocus>
        </div>
        <div class="mb-3">
            <label class="form-label">Пароль</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Войти</button>
    </form>

    <div class="mt-3 text-center">
        <a th:href="@{/register}">Нет аккаунта? Зарегистрироваться</a>
    </div>
    <div class="mt-2 text-center">
        <a th:href="@{/items}">← Вернуться к витрине</a>
    </div>
</div>
</body>
</html>
