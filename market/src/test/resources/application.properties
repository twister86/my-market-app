spring.main.web-application-type=reactive

spring.r2dbc.url=r2dbc:h2:mem:///testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.r2dbc.username=user
spring.r2dbc.password=password

spring.data.redis.host=localhost
spring.data.redis.port=6370

spring.security.oauth2.client.registration.payment-client.client-id=market-app
spring.security.oauth2.client.registration.payment-client.client-secret=market-secret
spring.security.oauth2.client.registration.payment-client.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.payment-client.scope=payment.read,payment.write
spring.security.oauth2.client.provider.payment-client.token-uri=http://localhost:9999/oauth2/token

payment.service.url=http://localhost:9999

spring.thymeleaf.cache=false
